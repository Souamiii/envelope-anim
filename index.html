<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animation Enveloppe</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
  </style>
</head>
<body>
  <video
    id="myVideo"
    autoplay
    loop
    muted
    playsinline
    preload="auto"
  >
    <source src="ANIM-ENVELOPPE-FINALE.webm" type="video/webm" />
  </video>

  <script>
    const video = document.getElementById('myVideo');

    // Force play dès que possible
    video.muted = true;
    video.play().catch(() => {
      // Si autoplay bloqué, on attend un clic utilisateur
      document.addEventListener('click', () => {
        video.play();
      }, { once: true });
    });

    // Relance si la vidéo s'arrête
    video.addEventListener('ended', () => {
      video.currentTime = 0;
      video.play();
    });
  </script>
</body>
</html>
